  <rect x="173" y="41.5" width="26" height="5" rx="1.5" fill="rgba(248,81,73,0.35)"/>
  <!-- Red line in minimap — prominent -->
  <rect x="174" y="43" width="24" height="2" rx="1" fill="#f85149"/>

