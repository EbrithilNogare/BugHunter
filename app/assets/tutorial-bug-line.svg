  <rect width="200" height="22" fill="#161b22"/>
  <rect x="8" y="7" width="8" height="8" rx="1.5" fill="#3d444d"/>
  <rect x="20" y="9" width="55" height="4" rx="2" fill="#3d444d"/>

  <!-- Code area — dimmed, no bug visible -->
  <rect x="8" y="31" width="88" height="3" rx="1.5" fill="#1c2128"/>
  <rect x="8" y="40" width="65" height="3" rx="1.5" fill="#1c2128"/>
  <rect x="8" y="49" width="98" height="3" rx="1.5" fill="#1c2128"/>
