  <rect x="176" y="32" width="14" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="37" width="20" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="50" width="16" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="55" width="21" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="60" width="12" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="65" width="18" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="70" width="14" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="75" width="19" height="1.5" rx="0.75" fill="#3d444d"/>
  <rect x="176" y="80" width="16" height="1.5" rx="0.75" fill="#3d444d"/>
