  <path d="M165.5 48.5 L169.5 50.5 L166.5 53.5" stroke="#f85149" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

  <!-- "minimap" label below highlight box -->
  <text x="185" y="115" font-size="5.5" text-anchor="middle" dominant-baseline="middle" fill="#f85149" font-family="monospace" opacity="0.75">minimap</text>
